name: Build, Approve & Push to Docker Hub

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  DOCKERHUB_REPOSITORY: ${{ secrets.DOCKERHUB_USERNAME }}/${{ secrets.DOCKERHUB_REPOSITORY }}
  IMAGE_TAG: ${{ github.sha }}

jobs:
  # ──────────────────────────────────────────
  # JOB 1 — Build & Save Docker Image
  # ──────────────────────────────────────────
  build:
    name: 🏗️ Build Docker Image
    runs-on: ubuntu-latest

    outputs:
      image-tag: ${{ env.IMAGE_TAG }}

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false                         # Don't push yet — save as tar
          tags: ${{ env.DOCKERHUB_REPOSITORY }}:${{ env.IMAGE_TAG }}
          outputs: type=docker,dest=/tmp/image.tar
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Upload image artifact
        uses: actions/upload-artifact@v4
        with:
          name: docker-image
          path: /tmp/image.tar
          retention-days: 1

  # ──────────────────────────────────────────
  # JOB 2 — Human Approval Gate
  # ──────────────────────────────────────────
  approve:
    name: 🙋 Human Approval
    runs-on: ubuntu-latest
    needs: build

    environment:
      name: production                        # Must create this Environment in
                                              # GitHub → Settings → Environments
                                              # and add required reviewers there

    steps:
      - name: Awaiting approval
        run: echo "Approval granted — proceeding to push image to Docker Hub."

  # ──────────────────────────────────────────
  # JOB 3 — Push to Docker Hub
  # ──────────────────────────────────────────
  push:
    name: 🚀 Push to Docker Hub
    runs-on: ubuntu-latest
    needs: approve

    steps:
      - name: Download image artifact
        uses: actions/download-artifact@v4
        with:
          name: docker-image
          path: /tmp

      - name: Load Docker image
        run: docker load --input /tmp/image.tar

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}     # Use an Access Token, not your password

      - name: Tag image for Docker Hub
        run: |
          # Tag with commit SHA
          docker tag \
            ${{ env.DOCKERHUB_REPOSITORY }}:${{ env.IMAGE_TAG }} \
            ${{ env.DOCKERHUB_REPOSITORY }}:${{ env.IMAGE_TAG }}

          # Also tag as 'latest'
          docker tag \
            ${{ env.DOCKERHUB_REPOSITORY }}:${{ env.IMAGE_TAG }} \
            ${{ env.DOCKERHUB_REPOSITORY }}:latest

      - name: Push image to Docker Hub
        run: |
          docker push ${{ env.DOCKERHUB_REPOSITORY }}:${{ env.IMAGE_TAG }}
          docker push ${{ env.DOCKERHUB_REPOSITORY }}:latest

      - name: Print image URI
        run: |
          echo "✅ Image pushed successfully:"
          echo "docker.io/${{ env.DOCKERHUB_REPOSITORY }}:${{ env.IMAGE_TAG }}"
