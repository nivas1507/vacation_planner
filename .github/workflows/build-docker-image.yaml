name: Build, Approve & Push to AWS ECR + Docker Hub

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  IMAGE_TAG: ${{ github.sha }}
  AWS_REGION: ${{ secrets.AWS_REGION }}
  ECR_REPOSITORY: ${{ secrets.ECR_REPOSITORY }}
  DOCKERHUB_REPOSITORY: ${{ secrets.DOCKERHUB_USERNAME }}/${{ secrets.DOCKERHUB_REPOSITORY }}

jobs:
  # ──────────────────────────────────────────
  # JOB 1 — Build & Save Docker Image
  # ──────────────────────────────────────────
  build:
    name: 🏗️ Build Docker Image
    runs-on: ubuntu-latest

    outputs:
      image-tag: ${{ env.IMAGE_TAG }}

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up QEMU (cross-platform emulation)
        uses: docker/setup-qemu-action@v3
        with:
          platforms: linux/arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          platforms: linux/arm64
          push: false
          tags: app:${{ env.IMAGE_TAG }}
          build-args: |
            SERVICE_NAME=vacation_planner_agent
          outputs: type=docker,dest=/tmp/image.tar
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Upload image artifact
        uses: actions/upload-artifact@v4
        with:
          name: docker-image
          path: /tmp/image.tar
          retention-days: 1

  # ──────────────────────────────────────────
  # JOB 2 — Human Approval Gate
  # ──────────────────────────────────────────
  approve:
    name: 🙋 Human Approval
    runs-on: ubuntu-latest
    needs: build

    environment:
      name: production                        # GitHub → Settings → Environments
                                              # → add required reviewers

    steps:
      - name: Awaiting approval
        run: echo "Approval granted — proceeding to push image to AWS ECR & Docker Hub."

  # ──────────────────────────────────────────
  # JOB 3a — Push to AWS ECR
  # ──────────────────────────────────────────
  push-ecr:
    name: 🚀 Push to AWS ECR
    runs-on: ubuntu-latest
    needs: approve

    steps:
      - name: Download image artifact
        uses: actions/download-artifact@v4
        with:
          name: docker-image
          path: /tmp

      - name: Load Docker image
        run: docker load --input /tmp/image.tar

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
          # ── OR use OIDC (recommended — no long-lived keys) ─────────────
          # role-to-assume: arn:aws:iam::123456789012:role/GitHubActionsRole
          # aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Tag & push image to ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          docker tag app:${{ env.IMAGE_TAG }} \
            ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:${{ env.IMAGE_TAG }}
          docker tag app:${{ env.IMAGE_TAG }} \
            ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:latest

          docker push ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:${{ env.IMAGE_TAG }}
          docker push ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:latest

          echo "✅ ECR image pushed:"
          echo "${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:${{ env.IMAGE_TAG }}"

  # ──────────────────────────────────────────
  # JOB 3b — Push to Docker Hub
  # ──────────────────────────────────────────
  push-dockerhub:
    name: 🚀 Push to Docker Hub
    runs-on: ubuntu-latest
    needs: approve

    steps:
      - name: Download image artifact
        uses: actions/download-artifact@v4
        with:
          name: docker-image
          path: /tmp

      - name: Load Docker image
        run: docker load --input /tmp/image.tar

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Tag & push image to Docker Hub
        run: |
          docker tag app:${{ env.IMAGE_TAG }} \
            ${{ env.DOCKERHUB_REPOSITORY }}:${{ env.IMAGE_TAG }}
          docker tag app:${{ env.IMAGE_TAG }} \
            ${{ env.DOCKERHUB_REPOSITORY }}:latest

          docker push ${{ env.DOCKERHUB_REPOSITORY }}:${{ env.IMAGE_TAG }}
          docker push ${{ env.DOCKERHUB_REPOSITORY }}:latest

          echo "✅ Docker Hub image pushed:"
          echo "docker.io/${{ env.DOCKERHUB_REPOSITORY }}:${{ env.IMAGE_TAG }}"

  # ──────────────────────────────────────────
  # JOB 4 — Summary
  # ──────────────────────────────────────────
  summary:
    name: ✅ Deployment Summary
    runs-on: ubuntu-latest
    needs: [push-ecr, push-dockerhub]

    steps:
      - name: Print summary
        run: |
          echo "=================================================="
          echo "✅ Image successfully pushed to both registries!"
          echo "  • AWS ECR     : ${{ env.ECR_REPOSITORY }}:${{ env.IMAGE_TAG }}"
          echo "  • Docker Hub  : ${{ env.DOCKERHUB_REPOSITORY }}:${{ env.IMAGE_TAG }}"
          echo "=================================================="