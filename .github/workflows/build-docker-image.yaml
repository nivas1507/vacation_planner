name: Build, Approve & Push to AWS ECR

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}                      # Change to your AWS region
  ECR_REPOSITORY: ${{ secrets.ECR_REPOSITORY }}              # Change to your ECR repo name
  IMAGE_TAG: ${{ github.sha }}

jobs:
  # ──────────────────────────────────────────
  # JOB 1 — Build & Save Docker Image
  # ──────────────────────────────────────────
  build:
    name: 🏗️ Build Docker Image
    runs-on: ubuntu-latest

    outputs:
      image-tag: ${{ env.IMAGE_TAG }}

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false                         # Don't push yet — save as tar
          tags: ${{ env.ECR_REPOSITORY }}:${{ env.IMAGE_TAG }}
          outputs: type=docker,dest=/tmp/image.tar
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Upload image artifact
        uses: actions/upload-artifact@v4
        with:
          name: docker-image
          path: /tmp/image.tar
          retention-days: 1

  # ──────────────────────────────────────────
  # JOB 2 — Human Approval Gate
  # ──────────────────────────────────────────
  approve:
    name: 🙋 Human Approval
    runs-on: ubuntu-latest
    needs: build

    environment:
      name: production                        # Must create this Environment in
                                              # GitHub → Settings → Environments
                                              # and add required reviewers there

    steps:
      - name: Awaiting approval
        run: echo "Approval granted — proceeding to push image to AWS ECR."

  # ──────────────────────────────────────────
  # JOB 3 — Push to AWS ECR
  # ──────────────────────────────────────────
  push:
    name: 🚀 Push to AWS ECR
    runs-on: ubuntu-latest
    needs: approve

    steps:
      - name: Download image artifact
        uses: actions/download-artifact@v4
        with:
          name: docker-image
          path: /tmp

      - name: Load Docker image
        run: docker load --input /tmp/image.tar

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
          # ── OR use OIDC (recommended, no long-lived keys) ──────────────
          # role-to-assume: arn:aws:iam::123456789012:role/GitHubActionsRole
          # aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Tag image for ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          docker tag \
            ${{ env.ECR_REPOSITORY }}:${{ env.IMAGE_TAG }} \
            ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:${{ env.IMAGE_TAG }}

          # Also tag as 'latest'
          docker tag \
            ${{ env.ECR_REPOSITORY }}:${{ env.IMAGE_TAG }} \
            ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:latest

      - name: Push image to ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          docker push ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:${{ env.IMAGE_TAG }}
          docker push ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:latest

      - name: Print image URI
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          echo "✅ Image pushed successfully:"
          echo "${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:${{ env.IMAGE_TAG }}"
